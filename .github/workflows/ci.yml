name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metricstore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d metricstore_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/metricstore_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/metricstore_test
      AUTH_ENABLED: false
      PYTHONPATH: src

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Wait for PostgreSQL
        run: |
          python - <<'PY'
          import socket
          import time

          deadline = time.time() + 30
          last_error = None

          while time.time() < deadline:
              try:
                  with socket.create_connection(("127.0.0.1", 5432), timeout=1):
                      print("PostgreSQL is accepting TCP connections")
                      break
              except OSError as exc:
                  last_error = exc
                  time.sleep(1)
          else:
              raise SystemExit(f"PostgreSQL did not become ready: {last_error}")
          PY

      - name: Run tests with coverage
        run: |
          pytest --cov=metricstore --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .
